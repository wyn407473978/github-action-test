name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_PREFIX: ${{ secrets.ALIYUN_REGISTRY_URL }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/react-gin
  FRONTEND_IMAGE: ${{ env.IMAGE_PREFIX }}:frontend
  BACKEND_IMAGE: ${{ env.IMAGE_PREFIX }}:backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_URL }}
          username: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          password: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          ALIYUN_REGISTRY_URL: ${{ secrets.ALIYUN_REGISTRY_URL }}
          ALIYUN_REGISTRY_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << 'EOF'
            set -e

            echo "$ALIYUN_ACCESS_KEY_SECRET" | docker login -u "$ALIYUN_ACCESS_KEY_ID" --password-stdin "$ALIYUN_REGISTRY_URL"

            cd /opt/app

            docker compose pull

            docker compose up -d --no-deps

            docker image prune -f

            echo "Deploy completed successfully!"
          EOF
