name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate registry secret format
        env:
          ALIYUN_REGISTRY_URL: ${{ secrets.ALIYUN_REGISTRY_URL }}
        run: |
          set -e
          if [ -z "$ALIYUN_REGISTRY_URL" ]; then
            echo "ALIYUN_REGISTRY_URL is empty"
            exit 1
          fi
          if echo "$ALIYUN_REGISTRY_URL" | grep -Eq '^https?://'; then
            echo "ALIYUN_REGISTRY_URL must not include http:// or https://"
            exit 1
          fi
          if echo "$ALIYUN_REGISTRY_URL" | grep -q '/'; then
            echo "ALIYUN_REGISTRY_URL must be a bare registry domain without path"
            exit 1
          fi
          echo "Registry secret format looks valid."

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_URL }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY_URL }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/react-gin:frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY_URL }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/react-gin:backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Debug SSH Info
        run: |
          echo "=== SSH Debug Info ==="
          echo "SERVER_HOST: ${{ secrets.SERVER_HOST }}"
          echo "SERVER_USER: ${{ secrets.SERVER_USER }}"
          echo "SSH_PRIVATE_KEY starts with: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 50)..."
          echo "SSH_PRIVATE_KEY length: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | wc -c)"

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Validate SSH connection
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          if ! ssh -vvv -o BatchMode=yes -o ConnectTimeout=10 "$SERVER_USER@$SERVER_HOST" "echo 'SSH auth ok'"; then
            echo "SSH validation failed. Check SERVER_HOST/SERVER_USER, authorized_keys, and private key format in SSH_PRIVATE_KEY."
            exit 1
          fi

      - name: Upload compose file to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          ssh -o BatchMode=yes -o ConnectTimeout=10 "$SERVER_USER@$SERVER_HOST" "mkdir -p /opt/app"
          scp -o BatchMode=yes -o ConnectTimeout=10 deploy/docker-compose.prod.yml "$SERVER_USER@$SERVER_HOST:/opt/app/docker-compose.yml"

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          ALIYUN_REGISTRY_URL: ${{ secrets.ALIYUN_REGISTRY_URL }}
          ALIYUN_REGISTRY_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
          ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << EOF
            set -e

            echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USERNAME" --password-stdin "$ALIYUN_REGISTRY_URL"

            cd /opt/app
            cat > /opt/app/.env << ENVFILE
            ALIYUN_REGISTRY_URL=$ALIYUN_REGISTRY_URL
            ALIYUN_REGISTRY_NAMESPACE=$ALIYUN_REGISTRY_NAMESPACE
            ENVFILE

            docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml pull

            docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml up -d --no-deps

            docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml ps
            if [ -n "$(docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml ps -q --filter status=exited)" ]; then
              echo "One or more containers exited after deployment."
              docker compose --env-file /opt/app/.env -f /opt/app/docker-compose.yml logs --tail=200
              exit 1
            fi

            docker image prune -f

            echo "Deploy completed successfully!"
          EOF
