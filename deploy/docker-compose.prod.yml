services:
  frontend:
    image: ${ALIYUN_REGISTRY_URL}/${ALIYUN_REGISTRY_NAMESPACE}/react-gin:frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: ${ALIYUN_REGISTRY_URL}/${ALIYUN_REGISTRY_NAMESPACE}/react-gin:backend
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
